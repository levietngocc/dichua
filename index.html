 { // Ngày 8
  t: "Vite, JSX, Props – Làm quen với React và Tailwind",
  c: `**Vite** – công cụ build siêu nhanh cho React:
\`\`\`bash
npm create vite@latest my-app -- --template react
cd my-app
npm install
npm run dev
\`\`\`

**Cấu trúc thư mục quan trọng:**
- \`index.html\`: file gốc, chứa <div id="root">
- \`src/main.jsx\`: khởi tạo React, render App vào root
- \`src/App.jsx\`: component chính
- \`src/App.css\`: style mặc định (có thể xóa)

**JSX – JavaScript XML:**
- Cho phép viết HTML trong JavaScript
- Phải return 1 phần tử duy nhất (dùng <></> hoặc <div>)
- {} để chèn biểu thức JavaScript
- \`className\` thay cho \`class\`
- \`htmlFor\` thay cho \`for\`

**Props – truyền dữ liệu từ cha xuống con:**
\`\`\`jsx
// Component con
function Child({ name, age }) {
  return <div>{name} - {age}</div>;
}

// Component cha
function Parent() {
  return <Child name="John" age={25} />;
}
\`\`\`

**Cài Tailwind vào Vite:**
\`\`\`bash
npm install -D tailwindcss postcss autoprefixer
npx tailwindcss init -p
\`\`\`

Cấu hình \`tailwind.config.js\`:
\`\`\`js
content: ["./index.html", "./src/**/*.{js,ts,jsx,tsx}"],
\`\`\`

Thêm vào \`src/index.css\`:
\`\`\`css
@tailwind base;

@tailwind utilities;

{ // Ngày 9
  t: "useState – State, setState, và xử lý form cơ bản",
  c: `**useState – hook quản lý state:**\n\`\`\`jsx\nimport { useState } from 'react';\n\nfunction Counter() {\n  const [count, setCount] = useState(0);\n  \n  return (\n    <div>\n      <p>Count: {count}</p>\n      <button onClick={() => setCount(count + 1)}>Tăng</button>\n    </div>\n  );\n}\n\`\`\`\n\n**Nguyên tắc quan trọng:**\n- Không mutate state trực tiếp (đặc biệt với object/array)\n- Dùng functional update khi state mới phụ thuộc vào state cũ: \`setCount(prev => prev + 1)\`\n- State cập nhật bất đồng bộ – không thể log ngay sau setState\n\n**Object state:**\n\`\`\`jsx\nconst [user, setUser] = useState({ name: '', age: 0 });\n// Cập nhật đúng cách:\nsetUser({ ...user, name: 'John' });\n\`\`\`\n\n**Array state:**\n\`\`\`jsx\nconst [todos, setTodos] = useState([]);\n// Thêm: setTodos([...todos, newTodo])\n// Xóa: setTodos(todos.filter(t => t.id !== id))\n// Sửa: setTodos(todos.map(t => t.id === id ? {...t, done: true} : t))\n\`\`\`\n\n**Controlled component – input lấy giá trị từ state:**\n\`\`\`jsx\n<input \n  type="text"\n  value={value}\n  onChange={(e) => setValue(e.target.value)}\n/>\n\`\`\`\n\n**Form handling cơ bản:**\n\`\`\`jsx\nconst [formData, setFormData] = useState({\n  email: '',\n  password: ''\n});\n\nconst handleChange = (e) => {\n  setFormData({\n    ...formData,\n    [e.target.name]: e.target.value\n  });\n};\n\`\`\``,
  p: `Xây dựng form đăng ký hoàn chỉnh với validation thủ công:\n\n**Fields:** name, email, password, confirmPassword, acceptTerms\n\n**Validation rules:**\n- name: không được trống\n- email: đúng định dạng (dùng regex đơn giản)\n- password: ít nhất 6 ký tự\n- confirmPassword: phải giống password\n- acceptTerms: phải được check\n\n**Yêu cầu:**\n- Hiển thị lỗi ngay khi blur (onBlur) hoặc khi người dùng gõ\n- Disable nút Submit nếu có bất kỳ lỗi nào\n- Khi submit thành công, log dữ liệu và reset form\n- Sử dụng component Input đã tạo ở ngày 8\n- Style đẹp bằng Tailwind`,
  r: ["https://react.dev/reference/react/useState", "https://react.dev/learn/state-a-components-memory", "https://react.dev/learn/updating-objects-in-state", "https://react.dev/learn/updating-arrays-in-state"],
  s: ["Tạo bộ đếm với 3 nút: +1, -1, reset.", "Tạo app Todo đơn giản: thêm todo, hiển thị danh sách.", "Thêm checkbox 'Hoàn thành' cho mỗi todo, click để gạch ngang.", "Tạo dropdown chọn tỉnh/thành (dữ liệu cứng), hiển thị lựa chọn bên dưới.", "Tạo nút Toggle hiển thị/ẩn một block văn bản."],
  q: ["Tại sao không nên mutate state trực tiếp?", "Khi nào cần dùng functional update trong setState?", "Controlled component khác uncontrolled thế nào?", "Làm thế nào để cập nhật một phần tử trong mảng state?"]

{ // Ngày 10
  t: "React Hook Form & Zod – Xây dựng form chuyên nghiệp",
  c: `**React Hook Form** – thư viện quản lý form hiệu quả, giảm re-render.\nCài đặt: \`npm install react-hook-form\`\n\n**Zod** – thư viện validate dữ liệu với TypeScript support.\nCài đặt: \`npm install zod @hookform/resolvers\`\n\n**Kết hợp React Hook Form và Zod:**\n\`\`\`jsx\nimport { useForm } from 'react-hook-form';\nimport { zodResolver } from '@hookform/resolvers/zod';\nimport { z } from 'zod';\n\nconst schema = z.object({\n  email: z.string().email('Email không hợp lệ'),\n  password: z.string().min(6, 'Mật khẩu ít nhất 6 ký tự'),\n});\n\ntype FormData = z.infer<typeof schema>;\n\nfunction LoginForm() {\n  const { register, handleSubmit, formState: { errors } } = useForm<FormData>({\n    resolver: zodResolver(schema)\n  });\n\n  const onSubmit = (data) => console.log(data);\n\n  return (\n    <form onSubmit={handleSubmit(onSubmit)}>\n      <input {...register('email')} />\n      {errors.email && <p>{errors.email.message}</p>}\n      <input type="password" {...register('password')} />\n      {errors.password && <p>{errors.password.message}</p>}\n      <button type="submit">Đăng nhập</button>\n    </form>\n  );\n}\n\`\`\`\n\n**Ưu điểm:**\n- Tự động quản lý state, validation, error messages.\n- Dễ dàng tích hợp với UI components.\n- Hỗ trợ TypeScript mạnh mẽ.`,
  p: `Xây dựng form đăng ký cho Task Manager Pro sử dụng React Hook Form và Zod:\n\n1. **Tạo schema Zod** cho user:\n   - name: string, tối thiểu 2 ký tự\n   - email: email hợp lệ\n   - password: tối thiểu 6 ký tự, có ít nhất 1 chữ hoa, 1 số\n   - confirmPassword: phải khớp với password\n   - acceptTerms: boolean (phải true)\n\n2. **Tích hợp với React Hook Form**, dùng zodResolver.\n\n3. **Hiển thị lỗi** dưới mỗi input (dùng component Input đã tạo).\n\n4. **Xử lý submit**: log dữ liệu ra console.\n\n5. **Disable nút submit** khi form chưa hợp lệ (dùng isValid).`,
  r: ["https://react-hook-form.com/", "https://zod.dev/", "https://github.com/react-hook-form/resolvers"],
  s: ["Tạo form login đơn giản với React Hook Form + Zod.", "Thêm validation đồng bộ (password phải có chữ hoa, số).", "Tích hợp với component Input (hiển thị lỗi qua props error).", "Thêm loading state khi submit (giả lập setTimeout).", "Reset form sau khi submit thành công."],
  q: ["React Hook Form so với useState + handleChange có ưu điểm gì?", "Zod dùng để làm gì? Tại sao cần resolver?", "Làm thế nào để hiển thị lỗi từ server (ví dụ email đã tồn tại)?"]
},

{ // Ngày 11
  t: "Custom Hooks – Tách logic form và gọi API",
  c: `**Custom Hook** tái sử dụng logic giữa các component.\n\n**Ví dụ useLocalStorage:** (giữ nguyên)\n\n**Ví dụ useFetch:** (giữ nguyên)\n\n**Ví dụ useDebounce:** (giữ nguyên)\n\n**Tách logic form thành custom hook:**\n\`\`\`jsx\nfunction useLoginForm() {\n  const schema = z.object({ email: z.string().email(), password: z.string().min(6) });\n  \n  const { register, handleSubmit, formState: { errors } } = useForm({\n    resolver: zodResolver(schema)\n  });\n\n  const onSubmit = async (data) => {\n    // Gọi API login\n    try {\n      await loginApi(data);\n      // xử lý thành công\n    } catch (error) {\n      // hiển thị lỗi từ server\n    }\n  };\n\n  return { register, handleSubmit: handleSubmit(onSubmit), errors };\n}\n\`\`\``,
  p: `Xây dựng 3 custom hook và áp dụng vào app users:\n\n1. **useLocalStorage** – lưu theme (dark/light mode)\n   - Tạo nút toggle theme, lưu vào localStorage\n   - Khi load trang, đọc theme từ localStorage và áp dụng (dùng class dark:...)\n\n2. **useDebounce** – tối ưu search\n   - Search users theo tên, nhưng chỉ gọi API sau khi ngừng gõ 500ms\n   - (Ở bài này, vì đã có dữ liệu, chỉ cần debounce setSearchTerm)\n\n3. **useFetch** – thay thế useEffect fetch\n   - Dùng useFetch để lấy users\n   - Xử lý loading, error\n\n4. **Tách form đăng ký thành custom hook** useRegisterForm (dùng React Hook Form + Zod).`,
  r: ["https://react.dev/learn/reusing-logic-with-custom-hooks", "https://usehooks.com/"],
  s: ["Viết useToggle: trả về [value, toggle] để quản lý boolean.", "Viết useArray: trả về các hàm push, filter, update, remove cho mảng.", "Viết useWindowSize: trả về kích thước window hiện tại, cập nhật khi resize.", "Viết useHover: nhận ref, trả về boolean đang hover.", "Viết usePrevious: lưu giá trị trước đó của state/prop."],
  q: ["Custom Hook có thể dùng hook khác không?", "Tại sao tên custom hook phải bắt đầu bằng 'use'?", "Làm thế nào để chia sẻ logic giữa nhiều component?", "Custom Hook có thể nhận tham số là function không?"]

  c: `**React Router** cho phép xây dựng ứng dụng nhiều "trang" mà không tải lại.\n\nCài đặt: \`npm i react-router-dom\`\n\n**Các component chính:**\n\`\`\`jsx\nimport { BrowserRouter, Routes, Route, Link, NavLink, useParams, useNavigate, useLocation } from 'react-router-dom';\n\`\`\`\n\n**Cấu hình cơ bản:** (giữ nguyên)\n\n**Lấy tham số từ URL (useParams):** (giữ nguyên)\n\n**Chuyển trang lập trình (useNavigate):** (giữ nguyên)\n\n**Protected Route:** (giữ nguyên)`,

  c: `**Zustand** là thư viện state management nhẹ, dễ dùng hơn Redux.\n\nCài đặt: \`npm i zustand\`\n\n**Tạo store cơ bản:** (giữ nguyên)\n\n**Store với object phức tạp:** (giữ nguyên)\n\n**Persist middleware – lưu vào localStorage:** (giữ nguyên)\n\n**Selectors – tối ưu re-render:** (giữ nguyên)`,
  p: `Xây dựng giỏ hàng hoàn chỉnh với Zustand:\n\n**Cart Store:**\n- items: mảng sản phẩm (id, name, price, quantity)\n- addItem: thêm sản phẩm (nếu đã có thì tăng quantity)\n- removeItem: xóa sản phẩm\n- updateQuantity: cập nhật số lượng\n- clearCart: xóa toàn bộ\n- totalItems: tổng số lượng (derived state)\n- totalPrice: tổng tiền (derived state)\n- Dùng persist để giỏ hàng không mất khi reload\n\n**Giao diện:**\n- Trang Home: danh sách sản phẩm (dữ liệu cứng), mỗi sản phẩm có nút "Thêm vào giỏ"\n- Trang Cart: hiển thị danh sách sản phẩm trong giỏ, cho phép xóa, cập nhật số lượng\n- Header: hiển thị số lượng sản phẩm trong giỏ (dùng selector)\n- Nút Checkout: hiển thị tổng tiền và nút thanh toán (giả)`,

  { // Ngày 15
    t: "React Performance – memo, useMemo, useCallback",
    c: `**Tại sao cần tối ưu performance?**\n- Mỗi lần state thay đổi, component re-render kéo theo tất cả component con\n- Gây lãng phí tài nguyên, ứng dụng chậm khi dữ liệu lớn\n\n**React.memo – tránh re-render component con không cần thiết:**\n\`\`\`jsx\nconst Child = React.memo(({ name }) => {\n  console.log('Child render');\n  return <div>{name}</div>;\n});\n\nfunction Parent() {\n  const [count, setCount] = useState(0);\n  // Child chỉ re-render khi prop name thay đổi\n  return (\n    <>\n      <button onClick={() => setCount(c => c+1)}>Count: {count}</button>\n      <Child name="John" />\n    </>\n  );\n}\n\`\`\`\n\n**useMemo – memoize giá trị tính toán:**\n\`\`\`jsx\nfunction ExpensiveComponent({ numbers }) {\n  // Chỉ tính lại khi numbers thay đổi\n  const total = useMemo(() => {\n    console.log('Tính tổng...');\n    return numbers.reduce((sum, n) => sum + n, 0);\n  }, [numbers]);\n  \n  return <div>Total: {total}</div>;\n}\n\`\`\`\n\n**useCallback – memoize hàm:**\n\`\`\`jsx\nfunction Parent() {\n  const [count, setCount] = useState(0);\n  \n  // Hàm này được tạo lại mỗi lần render, gây re-render Child không cần thiết\n  const handleClick = useCallback(() => {\n    console.log('Clicked');\n  }, []); // Chỉ tạo lại khi dependencies thay đổi\n  \n  return <Child onClick={handleClick} />;\n}\n\nconst Child = React.memo(({ onClick }) => {\n  console.log('Child render');\n  return <button onClick={onClick}>Click</button>;\n});\n\`\`\`\n\n**Khi nào dùng?**\n- React.memo: component con nhận props đơn giản, render thường xuyên\n- useMemo: tính toán tốn kém (duyệt mảng lớn, sort, filter)\n- useCallback: truyền hàm xuống component con đã memo\n\n**React DevTools Profiler:**\n- Ghi lại quá trình render\n- Phát hiện component render quá nhiều`,
    p: `Tối ưu ứng dụng E-Commerce từ tuần 2:\n\n1. **Phân tích performance hiện tại:**\n   - Cài React DevTools, dùng Profiler ghi lại\n   - Xác định component nào render quá nhiều\n\n2. **Áp dụng React.memo:**\n   - ProductCard: chỉ render khi sản phẩm thay đổi\n   - CartItem: chỉ render khi item thay đổi\n\n3. **Áp dụng useMemo:**\n   - Tính tổng tiền giỏ hàng (chỉ tính khi items thay đổi)\n   - Lọc sản phẩm theo danh mục (chỉ lọc khi products hoặc category thay đổi)\n\n4. **Áp dụng useCallback:**\n   - Hàm addToCart, removeFromCart truyền xuống ProductCard\n   - Hàm updateQuantity truyền xuống CartItem\n\n5. **Kiểm tra lại với Profiler:**\n   - So sánh số lần render trước và sau`,
    r: ["https://react.dev/reference/react/memo", "https://react.dev/reference/react/useMemo", "https://react.dev/reference/react/useCallback", "https://react.dev/learn/render-and-commit"],
    s: ["Tạo app đếm đơn giản, thêm component con, dùng memo để ngăn re-render.", "Tạo component tính giai thừa, dùng useMemo để cache kết quả.", "Tạo form có nhiều input, dùng useCallback cho hàm handleChange.", "Dùng React DevTools Profiler để đo performance trước và sau.", "Tìm hiểu về useTransition và useDeferredValue (React 18)."],
    q: ["React.memo hoạt động như thế nào?", "Khi nào dùng useMemo thay vì useCallback?", "Lạm dụng memo/useMemo có hại không? Tại sao?", "Làm thế nào để debug performance trong React?"]
  },
  { // Ngày 16
    t: "TypeScript với React – Kiểm soát kiểu dữ liệu",
    c: `**Tại sao cần TypeScript?**\n- Phát hiện lỗi khi đang code (không đợi runtime)\n- Tự động gợi ý code, autocomplete\n- Tự document code\n\n**Cài đặt TypeScript cho Vite:**\n\`\`\`bash\nnpm create vite@latest my-app -- --template react-ts\n# hoặc thêm vào project cũ:\nnpm install typescript @types/react @types/react-dom\nnpx tsc --init\n\`\`\`\n\n**Định nghĩa props cho component:**\n\`\`\`tsx\ninterface ButtonProps {\n  children: React.ReactNode;\n  variant?: 'primary' | 'secondary' | 'outline';\n  size?: 'sm' | 'md' | 'lg';\n  onClick?: () => void;\n  disabled?: boolean;\n  className?: string;\n}\n\nfunction Button({ \n  children, \n  variant = 'primary', \n  size = 'md',\n  onClick,\n  disabled,\n  className \n}: ButtonProps) {\n  // ...\n}\n\`\`\`\n\n**useState với TypeScript:**\n\`\`\`tsx\nconst [count, setCount] = useState<number>(0);\n\ninterface User {\n  id: number;\n  name: string;\n  email: string;\n}\n\nconst [user, setUser] = useState<User | null>(null);\n\`\`\`\n\n**useEffect và TypeScript:**\n\`\`\`tsx\nuseEffect(() => {\n  const fetchData = async () => {\n    const res = await fetch('/api/users');\n    const data: User[] = await res.json();\n    setUsers(data);\n  };\n  fetchData();\n}, []);\n\`\`\`\n\n**Custom Hook với TypeScript:**\n\`\`\`tsx\nfunction useLocalStorage<T>(key: string, initialValue: T): [T, (value: T) => void] {\n  const [storedValue, setStoredValue] = useState<T>(() => {\n    try {\n      const item = window.localStorage.getItem(key);\n      return item ? JSON.parse(item) : initialValue;\n    } catch (error) {\n      return initialValue;\n    }\n  });\n  \n  const setValue = (value: T) => {\n    try {\n      setStoredValue(value);\n      window.localStorage.setItem(key, JSON.stringify(value));\n    } catch (error) {}\n  };\n  \n  return [storedValue, setValue];\n}\n\`\`\`\n\n**Event handlers:**\n\`\`\`tsx\nconst handleChange = (e: React.ChangeEvent<HTMLInputElement>) => {\n  setValue(e.target.value);\n};\n\nconst handleSubmit = (e: React.FormEvent<HTMLFormElement>) => {\n  e.preventDefault();\n  // ...\n};\n\`\`\``,
    p: `Chuyển đổi ứng dụng E-Commerce sang TypeScript:\n\n1. **Cài đặt TypeScript** và cấu hình\n\n2. **Định nghĩa interfaces/models:**\n   \`\`\`ts\n   interface Product {\n     id: number;\n     title: string;\n     price: number;\n     description: string;\n     category: string;\n     image: string;\n   }\n   \n   interface CartItem extends Product {\n     quantity: number;\n   }\n   \n   interface User {\n     id: number;\n     name: string;\n     email: string;\n   }\n   \`\`\`\n\n3. **Chuyển đổi tất cả component:**\n   - Thêm props interface cho mỗi component\n   - Định nghĩa kiểu cho state\n   - Định nghĩa kiểu cho custom hooks\n\n4. **Chuyển đổi store Zustand:**\n   \`\`\`ts\n   interface CartState {\n     items: CartItem[];\n     addItem: (product: Product) => void;\n     removeItem: (id: number) => void;\n     updateQuantity: (id: number, quantity: number) => void;\n     clearCart: () => void;\n     totalItems: number;\n     totalPrice: number;\n   }\n   \`\`\`\n\n5. **Sửa tất cả lỗi TypeScript** (nếu có)`,

  { // Ngày 17
    t: "Compound Components & Render Props – Pattern nâng cao",
    c: `**Compound Components – component cha quản lý state, component con render:**\n\n\`\`\`tsx\n// Tabs.tsx\nimport { createContext, useContext, useState } from 'react';\n\ninterface TabsContextType {\n  activeIndex: number;\n  setActiveIndex: (index: number) => void;\n}\n\nconst TabsContext = createContext<TabsContextType | null>(null);\n\nfunction Tabs({ children }: { children: React.ReactNode }) {\n  const [activeIndex, setActiveIndex] = useState(0);\n  \n  return (\n    <TabsContext.Provider value={{ activeIndex, setActiveIndex }}>\n      <div className="tabs">{children}</div>\n    </TabsContext.Provider>\n  );\n}\n\nfunction TabList({ children }: { children: React.ReactNode }) {\n  return <div className="flex border-b">{children}</div>;\n}\n\nfunction Tab({ index, children }: { index: number; children: React.ReactNode }) {\n  const context = useContext(TabsContext);\n  if (!context) throw new Error('Tab must be used within Tabs');\n  \n  const { activeIndex, setActiveIndex } = context;\n  const isActive = activeIndex === index;\n  \n  return (\n    <button\n      className={\`px-4 py-2 \${isActive ? 'border-b-2 border-blue-500' : ''}\`}\n      onClick={() => setActiveIndex(index)}\n    >\n      {children}\n    </button>\n  );\n}\n\nfunction TabPanels({ children }: { children: React.ReactNode }) {\n  const context = useContext(TabsContext);\n  if (!context) throw new Error('TabPanels must be used within Tabs');\n  \n  return <div className="mt-4">{children[context.activeIndex]}</div>;\n}\n\n// Sử dụng:\n<Tabs>\n  <TabList>\n    <Tab index={0}>Tab 1</Tab>\n    <Tab index={1}>Tab 2</Tab>\n  </TabList>\n  <TabPanels>\n    <div>Nội dung tab 1</div>\n    <div>Nội dung tab 2</div>\n  </TabPanels>\n</Tabs>\n\`\`\`\n\n**Render Props – component nhận function làm children:**\n\n\`\`\`tsx\ninterface DataFetcherProps<T> {\n  url: string;\n  children: (data: { data: T | null; loading: boolean; error: string | null }) => React.ReactNode;\n}\n\nfunction DataFetcher<T>({ url, children }: DataFetcherProps<T>) {\n  const [data, setData] = useState<T | null>(null);\n  const [loading, setLoading] = useState(true);\n  const [error, setError] = useState<string | null>(null);\n  \n  useEffect(() => {\n    fetch(url)\n      .then(res => res.json())\n      .then(setData)\n      .catch(setError)\n      .finally(() => setLoading(false));\n  }, [url]);\n  \n  return children({ data, loading, error });\n}\n\n// Sử dụng:\n<DataFetcher url="/api/users">\n  {({ data, loading, error }) => {\n    if (loading) return <Spinner />;\n    if (error) return <Error message={error} />;\n    return <UserList users={data} />;\n  }}\n</DataFetcher>\n\`\`\``,
    p: `Xây dựng bộ component nâng cao:\n\n1. **Tabs Component:**\n   - Tabs, TabList, Tab, TabPanels\n   - Style bằng Tailwind, hỗ trợ các variant khác nhau\n   - Áp dụng vào trang Product Detail: hiển thị thông tin, đánh giá, liên quan\n\n2. **Accordion Component:**\n   - Accordion, AccordionItem, AccordionHeader, AccordionPanel\n   - Hỗ trợ single/multiple mở\n   - Áp dụng vào FAQ hoặc filter sản phẩm\n\n3. **Modal Component:**\n   - Dùng Portal để render modal ra ngoài root\n   - Hỗ trợ open/close, overlay click, esc key\n   - Áp dụng cho giỏ hàng hoặc login\n\n4. **DataFetcher với Render Props:**\n   - Component nhận url và function children\n   - Xử lý loading, error, data\n   - Thay thế useFetch ở một số chỗ`,
    r: ["https://react.dev/learn/passing-props-deeply-with-context", "https://react.dev/reference/react/createContext", "https://react.dev/learn/reusing-logic-with-custom-hooks#render-props", "https://www.patterns.dev/react/compound-pattern/"],
    s: ["Xây dựng Dropdown component với Compound Pattern.", "Xây dựng Stepper component (các bước) với Compound Pattern.", "Tạo Tooltip component dùng render props.", "Tạo Switch component (toggle) dùng render props.", "Kết hợp Compound + Render Props để tạo Form component."],
    q: ["Compound Pattern giải quyết vấn đề gì?", "Render Props khác gì so với Custom Hooks?", "Khi nào nên dùng Context trong Compound Pattern?", "Portal dùng để làm gì? Khi nào cần dùng?"]

  { // Ngày 18
    t: "Error Boundaries & Portals – Xử lý lỗi và render ngoài cây DOM",
    c: `**Error Boundaries – bắt lỗi trong component tree:**\n\n\`\`\`tsx\nclass ErrorBoundary extends React.Component<\n  { children: React.ReactNode; fallback?: React.ReactNode },\n  { hasError: boolean; error: Error | null }\n> {\n  constructor(props: any) {\n    super(props);\n    this.state = { hasError: false, error: null };\n  }\n\n  static getDerivedStateFromError(error: Error) {\n    return { hasError: true, error };\n  }\n\n  componentDidCatch(error: Error, errorInfo: React.ErrorInfo) {\n    console.log('Lỗi:', error, errorInfo);\n    // Gửi lỗi lên server (Sentry, LogRocket...)\n  }\n\n  render() {\n    if (this.state.hasError) {\n      return this.props.fallback || (\n        <div className="p-4 bg-red-100 text-red-700 rounded">\n          <h2>Có lỗi xảy ra</h2>\n          <p>{this.state.error?.message}</p>\n        </div>\n      );\n    }\n\n    return this.props.children;\n  }\n}\n\n// Sử dụng:\n<ErrorBoundary fallback={<div>Lỗi ở phần này</div>}>\n  <MyComponent />\n</ErrorBoundary>\n\`\`\`\n\n**Lưu ý:** Error Boundaries chỉ bắt lỗi trong:\n- Render\n- Lifecycle methods\n- Constructors\n\nKhông bắt được:\n- Event handlers (phải dùng try/catch)\n- Async code (setTimeout, requestAnimationFrame)\n- Server-side rendering\n- Lỗi trong Error Boundary itself\n\n**Portals – render component ra ngoài root:**\n\n\`\`\`tsx\nimport { createPortal } from 'react-dom';\n\nfunction Modal({ isOpen, onClose, children }: any) {\n  if (!isOpen) return null;\n  \n  return createPortal(\n    <div className="fixed inset-0 bg-black/50 flex items-center justify-center">\n      <div className="bg-white p-6 rounded-lg max-w-md">\n        {children}\n        <button onClick={onClose}>Đóng</button>\n      </div>\n    </div>,\n    document.body // render vào body thay vì trong cây DOM hiện tại\n  );\n}\n\`\`\`\n\n**Khi nào dùng Portal:**\n- Modal, Dialog\n- Tooltip, Popover\n- Dropdown menu (tránh bị overflow hidden)\n\n**Xử lý lỗi trong Event Handler:**\n\`\`\`tsx\nconst handleClick = async () => {\n  try {\n    await someAsyncFunction();\n  } catch (error) {\n    // Xử lý lỗi tại đây\n    setError(error.message);\n  }\n};\n\`\`\``,
    p: `Xây dựng hệ thống xử lý lỗi và modal cho E-Commerce:\n\n1. **ErrorBoundary component:**\n   - Bọc toàn bộ app\n   - Bọc từng route riêng\n   - Bọc component ProductDetail (dễ lỗi khi API fail)\n   - Gửi lỗi lên console (giả lập)\n\n2. **Modal Portal:**\n   - Modal giỏ hàng (hiển thị giỏ hàng dạng popup)\n   - Modal login\n   - Modal xác nhận xóa sản phẩm\n   - Đảm bảo click ra ngoài đóng modal\n\n3. **Tooltip Portal:**\n   - Tooltip hiển thị thông tin sản phẩm khi hover\n   - Render bằng portal để tránh bị che khuất\n\n4. **Global Error Handler:**\n   - Thêm event listener window.onerror\n   - Hiển thị thông báo lỗi chung khi app crash`,
    r: ["https://react.dev/reference/react/Component#catching-rendering-errors-with-an-error-boundary", "https://react.dev/reference/react-dom/createPortal", "https://github.com/facebook/react/issues/11409"],
    s: ["Tạo ErrorBoundary bọc component dễ lỗi, test bằng cách throw error.", "Tạo Modal đơn giản dùng Portal, style bằng Tailwind.", "Tạo Tooltip component dùng Portal, xuất hiện khi hover.", "Thêm nút 'Báo cáo lỗi' gửi thông tin lên server giả.", "Dùng try/catch trong event handler, hiển thị toast lỗi."],
    q: ["Error Boundary bắt được lỗi trong event handler không? Tại sao?", "Portal giải quyết vấn đề gì với z-index, overflow?", "Làm thế nào để log lỗi lên server?", "Khi nào nên dùng Portal thay vì render bình thường?"]
  },
  { // Ngày 19
    t: "Testing React Components với Jest & React Testing Library",
    c: `**Tại sao cần test?**\n- Đảm bảo code hoạt động đúng\n- Phát hiện lỗi sớm\n- Tự tin khi refactor\n- Tài liệu sống cho component\n\n**Cài đặt:**\n\`\`\`bash\nnpm install --save-dev jest @testing-library/react @testing-library/jest-dom @testing-library/user-event\n\`\`\`\n\n**Cấu hình Vite + Jest:**\n- Dùng vite-jest hoặc vitest (đơn giản hơn)\n- Tôi khuyên dùng **Vitest** cho Vite project\n\n**Các loại test:**\n1. **Unit test:** test hàm, custom hook riêng lẻ\n2. **Component test:** test component render, interaction\n3. **Integration test:** test nhiều component hoạt động cùng nhau\n\n**React Testing Library cơ bản:**\n\n\`\`\`tsx\nimport { render, screen, fireEvent } from '@testing-library/react';\nimport userEvent from '@testing-library/user-event';\nimport Button from './Button';\n\ntest('Button renders correctly', () => {\n  render(<Button>Click me</Button>);\n  expect(screen.getByText('Click me')).toBeInTheDocument();\n});\n\ntest('Button calls onClick when clicked', async () => {\n  const handleClick = vi.fn(); // jest.fn() nếu dùng Jest\n  render(<Button onClick={handleClick}>Click me</Button>);\n  \n  await userEvent.click(screen.getByText('Click me'));\n  expect(handleClick).toHaveBeenCalledTimes(1);\n});\n\ntest('Button disabled when disabled prop is true', () => {\n  render(<Button disabled>Click me</Button>);\n  expect(screen.getByText('Click me')).toBeDisabled();\n});\n\`\`\`\n\n**Test custom hook:**\n\`\`\`tsx\nimport { renderHook, act } from '@testing-library/react';\nimport useCounter from './useCounter';\n\ntest('useCounter increments count', () => {\n  const { result } = renderHook(() => useCounter(0));\n  \n  act(() => {\n    result.current.increment();\n  });\n  \n  expect(result.current.count).toBe(1);\n});\n\`\`\`\n\n**Test async:**\n\`\`\`tsx\ntest('fetches data and displays', async () => {\n  render(<UserList />);\n  \n  expect(screen.getByText('Loading...')).toBeInTheDocument();\n  \n  await screen.findByText('John Doe');\n  expect(screen.getByText('John Doe')).toBeInTheDocument();\n});\n\`\`\``,
    p: `Viết test cho ứng dụng E-Commerce:\n\n1. **Test Button component:**\n   - Render đúng các variant\n   - onClick được gọi khi click\n   - disabled hoạt động\n\n2. **Test ProductCard:**\n   - Hiển thị đúng tên, giá, ảnh\n   - Nút "Thêm vào giỏ" gọi đúng hàm\n\n3. **Test Cart store (Zustand):**\n   - Thêm sản phẩm\n   - Xóa sản phẩm\n   - Cập nhật số lượng\n   - Tính tổng tiền\n\n4. **Test custom hook useFetch:**\n   - Trả về loading, data, error\n   - Gọi API đúng URL\n   - Hủy request khi unmount\n\n5. **Test trang Home:**\n   - Hiển thị danh sách sản phẩm\n   - Loading state\n   - Error state\n   - Search hoạt động`,
    r: ["https://testing-library.com/docs/react-testing-library/intro/", "https://jestjs.io/docs/getting-started", "https://vitest.dev/guide/", "https://kentcdodds.com/blog/common-mistakes-with-react-testing-library"],

    q: ["getBy, queryBy, findBy khác nhau thế nào?", "Làm thế nào để test component có async operations?", "Tại sao nên dùng userEvent thay vì fireEvent?", "Mock API trong test như thế nào?"]

  { // Ngày 20
    t: "Tailwind Nâng Cao – cva, clsx, tailwind-merge, Design System",
    c: `**Vấn đề với Tailwind trong component:**\n- Phải viết nhiều className dài\n- Khó quản lý variants\n- Xung đột khi nhận className từ ngoài\n\n**clsx – kết hợp class có điều kiện:**\n\`\`\`tsx\nimport clsx from 'clsx';\n\nfunction Button({ variant = 'primary', size = 'md', className }) {\n  return (\n    <button className={clsx(\n      'rounded font-semibold transition',\n      {\n        'bg-blue-500 text-white hover:bg-blue-600': variant === 'primary',\n        'bg-gray-200 text-gray-800 hover:bg-gray-300': variant === 'secondary',\n        'border border-gray-300 text-gray-700 hover:bg-gray-50': variant === 'outline',\n        'px-2 py-1 text-sm': size === 'sm',\n        'px-4 py-2': size === 'md',\n        'px-6 py-3 text-lg': size === 'lg',\n      },\n      className\n    )}>\n      {children}\n    </button>\n  );\n}\n\`\`\`\n\n**cva (class-variance-authority) – quản lý variants chuyên nghiệp:**\n\`\`\`tsx\nimport { cva, type VariantProps } from 'class-variance-authority';\n\nconst buttonVariants = cva(\n  'rounded font-semibold transition', // base classes\n  {\n    variants: {\n      variant: {\n        primary: 'bg-blue-500 text-white hover:bg-blue-600',\n        secondary: 'bg-gray-200 text-gray-800 hover:bg-gray-300',\n        outline: 'border border-gray-300 text-gray-700 hover:bg-gray-50',\n      },\n      size: {\n        sm: 'px-2 py-1 text-sm',\n        md: 'px-4 py-2',\n        lg: 'px-6 py-3 text-lg',\n      },\n    },\n    defaultVariants: {\n      variant: 'primary',\n      size: 'md',\n    },\n  }\n);\n\ninterface ButtonProps extends VariantProps<typeof buttonVariants> {\n  children: React.ReactNode;\n  onClick?: () => void;\n  className?: string;\n}\n\nfunction Button({ children, variant, size, className, onClick }: ButtonProps) {\n  return (\n    <button \n      className={buttonVariants({ variant, size, className })}\n      onClick={onClick}\n    >\n      {children}\n    </button>\n  );\n}\n\`\`\`\n\n**tailwind-merge – gộp className không xung đột:**\n\`\`\`tsx\nimport { twMerge } from 'tailwind-merge';\n\nfunction Button({ className, ...props }) {\n  return (\n    <button \n      className={twMerge(\n        'bg-blue-500 text-white px-4 py-2 rounded',\n        className\n      )}\n      {...props}\n    />\n  );\n}\n\n// Khi dùng: <Button className="bg-red-500" /> \n// => bg-red-500 thay thế bg-blue-500, không bị xung đột\n\`\`\`\n\n**Kết hợp cả 3: cva + clsx + tailwind-merge**\n\n**Xây dựng Design System:**\n- Màu sắc: định nghĩa trong tailwind.config.js\n- Typography: text-xs, text-sm, text-base...\n- Spacing: p-2, p-4, gap-2...\n- Component variants: Button, Card, Badge, Input...`,
    p: `Xây dựng Design System hoàn chỉnh:\n\n1. **Cấu hình Tailwind:**\n   - Thêm màu sắc custom (primary, secondary, accent...)\n   - Thêm font family\n   - Thêm animation custom\n   - Cấu hình dark mode\n\n2. **Chuyển đổi tất cả component sang dùng cva:**\n   - Button (variant, size, fullWidth, disabled)\n   - Card (variant, padding, interactive)\n   - Badge (variant, size, rounded)\n   - Input (size, error, disabled)\n\n3. **Tạo utility function:**\n   - cn() kết hợp clsx + twMerge\n   - variants() từ cva\n\n4. **Document component:**\n   - Tạo file MDX hoặc đơn giản là comment\n   - Liệt kê các props, variants, ví dụ sử dụng\n\n5. **Áp dụng vào toàn bộ app**`,
    r: ["https://cva.style/docs", "https://github.com/lukeed/clsx", "https://github.com/dcastil/tailwind-merge", "https://tailwindcss.com/docs/configuration"],
    s: ["Cài cva và chuyển Button sang dùng cva.", "Cài clsx và tailwind-merge, tạo hàm cn() tiện ích.", "Thêm màu primary, secondary vào tailwind.config.", "Tạo theme dark mode cho toàn bộ component.", "Viết document cho Button component (trong comment)."],
    q: ["cva giải quyết vấn đề gì so với viết className thủ công?", "tailwind-merge dùng để làm gì? Cho ví dụ xung đột class.", "Làm thế nào để tạo design system nhất quán?", "Khi nào nên dùng clsx thay vì template string?"]

    t: "Lazy Loading, Code Splitting & Tổng kết Tuần 3",
    c: `**Tại sao cần lazy loading?**\n- Bundle JavaScript ngày càng lớn\n- Chia nhỏ bundle, tải khi cần\n- Cải thiện thời gian tải trang đầu\n\n**React.lazy – tải component khi cần:**\n\`\`\`tsx\nimport { lazy, Suspense } from 'react';\n\nconst ProductDetail = lazy(() => import('./pages/ProductDetail'));\nconst Cart = lazy(() => import('./pages/Cart'));\nconst Checkout = lazy(() => import('./pages/Checkout'));\n\nfunction App() {\n  return (\n    <BrowserRouter>\n      <Suspense fallback={<div className="p-4">Loading...</div>}>\n        <Routes>\n          <Route path="/" element={<Home />} />\n          <Route path="/product/:id" element={<ProductDetail />} />\n          <Route path="/cart" element={<Cart />} />\n          <Route path="/checkout" element={<Checkout />} />\n        </Routes>\n      </Suspense>\n    </BrowserRouter>\n  );\n}\n\`\`\`\n\n**Code splitting theo route:**\n- Mỗi route tải riêng bundle\n- Giảm dung lượng tải lần đầu\n\n**Code splitting theo component:**\n- Modal, Dialog (chỉ tải khi mở)\n- Editor (chỉ tải khi cần)\n\n**Suspense với data fetching (React 18):**\n\`\`\`tsx\n<Suspense fallback={<Spinner />}>\n  <ProductList />\n</Suspense>\n\`\`\`\n\n**React.memo + lazy:**\n\`\`\`tsx\nconst HeavyComponent = lazy(() => import('./HeavyComponent'));\nconst MemoizedHeavy = React.memo(HeavyComponent);\n\`\`\`\n\n**Tổng kết Tuần 3 – React + Tailwind chuyên sâu:**\n\n✓ Performance: memo, useMemo, useCallback  \n✓ TypeScript: kiểm soát kiểu dữ liệu  \n✓ Patterns: Compound Components, Render Props  \n✓ Error Handling: Error Boundaries, Portals  \n✓ Testing: Jest, React Testing Library  \n✓ Tailwind nâng cao: cva, clsx, tailwind-merge, Design System  \n✓ Lazy Loading: React.lazy, Suspense, Code Splitting\n\n**Bạn đã sẵn sàng để:**\n- Làm việc với dự án React lớn, real-world\n- Tối ưu performance chuyên nghiệp\n- Xây dựng design system riêng\n- Viết test đảm bảo chất lượng code\n- Phân tích và debug hiệu quả`,

  t: "Node.js & Express – Tạo server và API đầu tiên",
  c: `**Node.js là gì?** Môi trường chạy JavaScript trên server, dùng V8 engine của Chrome.
  
  **Khởi tạo project:**
  \`\`\`bash
  mkdir task-manager-api && cd task-manager-api
  npm init -y
  npm install express
  npm install -D nodemon
  \`\`\`
  
  **Thêm script vào package.json:**
  \`\`\`json
  "scripts": {
    "start": "node server.js",
    "dev": "nodemon server.js"
  }
  \`\`\`
  
  **Server cơ bản (server.js):**
  \`\`\`js
  const express = require('express');
  const app = express();
  
  // Middleware parse JSON
  app.use(express.json());
  
  // Route đầu tiên
  app.get('/', (req, res) => {
    res.json({ message: 'Hello World' });
  });
  
  // Route với params
  app.get('/users/:id', (req, res) => {
    const { id } = req.params;
    res.json({ userId: id });
  });
  
  // Route với query string
  app.get('/search', (req, res) => {
    const { q, page = 1 } = req.query;
    res.json({ query: q, page: Number(page) });
  });
  
  // POST request
  app.post('/users', (req, res) => {
    const userData = req.body;
    res.status(201).json({ message: 'User created', user: userData });
  });
  
  const PORT = process.env.PORT || 3000;
  app.listen(PORT, () => {
    console.log(\`Server running on port \${PORT}\`);
  });
  \`\`\`
  
  **Các phương thức HTTP chính:**
  - GET: lấy dữ liệu
  - POST: tạo mới
  - PUT: cập nhật toàn bộ
  - PATCH: cập nhật một phần
  - DELETE: xóa
  
  **Bài tập:** Xây dựng API CRUD cho tasks (lưu trong mảng tạm)`,

{ // Ngày 30
  t: "PostgreSQL – Tạo bảng, quan hệ và truy vấn SQL",
  c: `**PostgreSQL** là database quan hệ mạnh mẽ, mã nguồn mở.
  
  **Cài đặt PostgreSQL:**
  - Windows: https://www.postgresql.org/download/windows/
  - macOS: \`brew install postgresql\`
  - Linux: \`sudo apt install postgresql postgresql-contrib\`
  - Hoặc dùng Docker: \`docker run --name postgres -e POSTGRES_PASSWORD=password -p 5432:5432 -d postgres\`
  
  **GUI Client:** DBeaver, pgAdmin, hoặc dùng terminal.
  
  **Các lệnh SQL cơ bản:**
  \`\`\`sql
  -- Tạo database
  CREATE DATABASE task_manager;
  
  -- Kết nối database
  \\c task_manager;
  
  -- Tạo bảng users
  CREATE TABLE users (
    id SERIAL PRIMARY KEY,
    name VARCHAR(100) NOT NULL,
    email VARCHAR(100) UNIQUE NOT NULL,
    password VARCHAR(255) NOT NULL,
    role VARCHAR(50) DEFAULT 'user',
    created_at TIMESTAMP DEFAULT NOW(),
    updated_at TIMESTAMP DEFAULT NOW()
  );
  
  -- Tạo bảng tasks (liên kết với users)
  CREATE TABLE tasks (
    id SERIAL PRIMARY KEY,
    title VARCHAR(255) NOT NULL,
    description TEXT,
    status VARCHAR(50) DEFAULT 'todo',
    priority VARCHAR(50) DEFAULT 'medium',
    due_date DATE,
    user_id INTEGER REFERENCES users(id) ON DELETE CASCADE,
    created_at TIMESTAMP DEFAULT NOW(),
    updated_at TIMESTAMP DEFAULT NOW()
  );
  
  -- Thêm dữ liệu mẫu
  INSERT INTO users (name, email, password) VALUES ('John Doe', 'john@mail.com', 'hashed_password');
  INSERT INTO users (name, email, password) VALUES ('Jane Smith', 'jane@mail.com', 'hashed_password');
  
  INSERT INTO tasks (title, description, user_id) VALUES ('Học Node.js', 'Cơ bản về Node.js', 1);
  INSERT INTO tasks (title, description, user_id, status) VALUES ('Học PostgreSQL', 'Tạo database', 1, 'in-progress');
  INSERT INTO tasks (title, description, user_id, status, priority) VALUES ('Học Prisma', 'ORM cho Node.js', 2, 'done', 'high');
  
  -- Truy vấn cơ bản
  SELECT * FROM users;
  SELECT * FROM tasks WHERE user_id = 1;
  SELECT * FROM tasks WHERE status = 'done';
  
  -- JOIN lấy tasks kèm tên user
  SELECT tasks.*, users.name 
  FROM tasks 
  JOIN users ON tasks.user_id = users.id;
  
  -- UPDATE
  UPDATE tasks SET status = 'done', updated_at = NOW() WHERE id = 1;
  
  -- DELETE
  DELETE FROM users WHERE id = 2;
  \`\`\`

  - PRIMARY KEY: khóa chính
  - FOREIGN KEY: khóa ngoại
  - UNIQUE: không trùng
  - NOT NULL: không được rỗng
  - CHECK: kiểm tra điều kiện (ví dụ: status IN ('todo','in-progress','done'))`,

{ // Ngày 31
  t: "Prisma ORM – Kết nối Node.js với PostgreSQL",
  c: `**Prisma** là ORM hiện đại, giúp thao tác database bằng JavaScript thay vì SQL thuần.
  
  **Cài đặt Prisma:**
  \`\`\`bash
  npm install prisma --save-dev
  npx prisma init
  \`\`\`
  
  **Cấu hình .env:**
  \`\`\`
  DATABASE_URL="postgresql://postgres:password@localhost:5432/task_manager"
  \`\`\`
  
  **Định nghĩa model trong schema.prisma:**
  \`\`\`prisma
  generator client {
    provider = "prisma-client-js"
  }
  
  datasource db {
    provider = "postgresql"
    url      = env("DATABASE_URL")
  }
  
  model User {
    id        Int      @id @default(autoincrement())
    name      String
    email     String   @unique
    password  String
    role      String   @default("user")
    tasks     Task[]
    createdAt DateTime @default(now()) @map("created_at")
    updatedAt DateTime @updatedAt @map("updated_at")
  
    @@map("users")
  }
  
  model Task {
    id          Int      @id @default(autoincrement())
    title       String
    description String?
    status      String   @default("todo")
    priority    String   @default("medium")
    dueDate     DateTime? @map("due_date")
    user        User     @relation(fields: [userId], references: [id])
    userId      Int      @map("user_id")
    createdAt   DateTime @default(now()) @map("created_at")
    updatedAt   DateTime @updatedAt @map("updated_at")
  
    @@map("tasks")
  }
  \`\`\`
  
  **Chạy migration:**
  \`\`\`bash
  npx prisma migrate dev --name init
  \`\`\`
  
  **Sử dụng Prisma Client trong code:**
  \`\`\`js
  const { PrismaClient } = require('@prisma/client');
  const prisma = new PrismaClient();
  
  // Lấy tất cả users kèm tasks

    include: { tasks: true }
  });
  
  // Lấy user theo id
  const user = await prisma.user.findUnique({
    where: { id: 1 }
  });

    data: {
      email: 'test@mail.com',
      name: 'Test User',
      password: 'hashed_password'
    }
  });
  
  // Tạo task cho user
  const newTask = await prisma.task.create({
    data: {
      title: 'Học Prisma',

    where: { id: 1 },
    data: { status: 'done' }

  c: `**Tổ chức code theo mô hình MVC (Model-View-Controller):**
  \`\`\`

  **Ví dụ controller (userController.js):**
  \`\`\`js
  const { PrismaClient } = require('@prisma/client');
  const prisma = new PrismaClient();
  
  const getAllUsers = async (req, res) => {
    try {
      const users = await prisma.user.findMany({
        include: { tasks: true }
      });
      res.json(users);
    } catch (error) {
      res.status(500).json({ error: error.message });
    }
  };
  
  const getUserById = async (req, res) => {
    try {
      const { id } = req.params;
      const user = await prisma.user.findUnique({
        where: { id: Number(id) },
        include: { tasks: true }
      });
      
      if (!user) {
        return res.status(404).json({ error: 'User not found' });
      }
      
      res.json(user);
    } catch (error) {
      res.status(500).json({ error: error.message });
    }
  };
  
  const createUser = async (req, res) => {
    try {
      const { name, email, password } = req.body;
      
      // Validation cơ bản
      if (!name || !email || !password) {
        return res.status(400).json({ error: 'Name, email and password are required' });
      }
      
      // Kiểm tra email đã tồn tại chưa
      const existingUser = await prisma.user.findUnique({
        where: { email }
      });
      
      if (existingUser) {
        return res.status(400).json({ error: 'Email already exists' });
      }
      
      const user = await prisma.user.create({
        data: { name, email, password } // Lưu ý: password chưa hash (sẽ học sau)
      });
      
      res.status(201).json(user);
    } catch (error) {
      res.status(500).json({ error: error.message });
    }
  };
  
  const updateUser = async (req, res) => {
    try {
      const { id } = req.params;
      const { name, email } = req.body;
      
      const user = await prisma.user.update({
        where: { id: Number(id) },
        data: { name, email }
      });
      
      res.json(user);
    } catch (error) {
      if (error.code === 'P2025') {
        return res.status(404).json({ error: 'User not found' });
      }
      res.status(500).json({ error: error.message });
    }
  };
  
  const deleteUser = async (req, res) => {
    try {
      const { id } = req.params;
      await prisma.user.delete({
        where: { id: Number(id) }
      });
      res.status(204).send();
    } catch (error) {
      if (error.code === 'P2025') {
        return res.status(404).json({ error: 'User not found' });
      }
      res.status(500).json({ error: error.message });
    }
  };
  
  module.exports = {
    getAllUsers,
    getUserById,
    createUser,
    updateUser,
    deleteUser
  };
  \`\`\`

  module.exports = router;

  **Thêm validation với express-validator:**
  \`\`\`bash

  \`\`\`
  
  **Middleware validate (middleware/validate.js):**
  \`\`\`js
  const { body, validationResult } = require('express-validator');
  
  const validateUser = [
    body('email').isEmail().withMessage('Email không hợp lệ'),
    body('password').isLength({ min: 6 }).withMessage('Mật khẩu ít nhất 6 ký tự'),
    body('name').notEmpty().withMessage('Tên không được để trống'),
    (req, res, next) => {
      const errors = validationResult(req);
      if (!errors.isEmpty()) {
        return res.status(400).json({ errors: errors.array() });
      }
      next();
    }
  ];
  
  module.exports = { validateUser };

{ // Ngày 33
  t: "Middleware nâng cao – Logging, Error Handling, Environment",
  c: `**Middleware trong Express:** Hàm xử lý trước khi request đến route, có thể thay đổi req/res, kết thúc request, hoặc gọi next().
  
  **Built-in middleware:**
  - express.json() – parse JSON body
  - express.urlencoded() – parse form data
  - express.static() – phục vụ file tĩnh
  
  **Custom middleware – Logger:**
  \`\`\`js
  // middleware/logger.js
  const logger = (req, res, next) => {
    const timestamp = new Date().toISOString();
    console.log(\`[\${timestamp}] \${req.method} \${req.url}\`);
    next();
  };
  
  // Sử dụng
  app.use(logger);
  \`\`\`
  
  **Middleware xử lý lỗi tập trung (cải tiến):**
  \`\`\`js
  // middleware/errorHandler.js
  const errorHandler = (err, req, res, next) => {
    console.error(err.stack);
    
    // Lỗi từ Prisma
    if (err.code === 'P2002') {
      return res.status(400).json({ error: 'Duplicate field value' });
    }
    if (err.code === 'P2025') {
      return res.status(404).json({ error: 'Record not found' });
    }
    
    // Lỗi validation từ express-validator
    if (err.name === 'ValidationError') {
      return res.status(400).json({ errors: err.errors });
    }
    
    res.status(500).json({ error: 'Internal server error' });
  };
  
  module.exports = errorHandler;
  \`\`\`
  
  **Middleware 404 – route không tồn tại:**
  \`\`\`js
  // middleware/notFound.js
  const notFound = (req, res) => {
    res.status(404).json({ error: 'Route not found' });
  };

{ // Ngày 36
  t: "JWT & Bcrypt – Authentication hoàn chỉnh",
  c: `**Tại sao cần authentication?**
  - Xác định user đang gửi request
  - Bảo vệ tài nguyên chỉ cho phép user hợp lệ
  
  **Bcrypt – hash mật khẩu:**
  \`\`\`bash
  npm install bcrypt
  \`\`\`
  
  \`\`\`js
  const bcrypt = require('bcrypt');
  const saltRounds = 10;
  
  // Hash password
  const hashPassword = async (password) => {
    return await bcrypt.hash(password, saltRounds);
  };
  
  // So sánh password
  const comparePassword = async (password, hash) => {
    return await bcrypt.compare(password, hash);
  };
  \`\`\`
  
  **JWT (JSON Web Token):**
  \`\`\`bash
  npm install jsonwebtoken
  \`\`\`
  
  \`\`\`js
  const jwt = require('jsonwebtoken');
  
  // Tạo token
  const generateToken = (user) => {
    return jwt.sign(
      { userId: user.id, email: user.email },
      process.env.JWT_SECRET,
      { expiresIn: '7d' }
    );
  };
  
  // Verify token (middleware)
  const authenticate = (req, res, next) => {
    const authHeader = req.headers.authorization;
    const token = authHeader && authHeader.split(' ')[1]; // Bearer TOKEN
    
    if (!token) {
      return res.status(401).json({ error: 'No token provided' });
    }
    
    jwt.verify(token, process.env.JWT_SECRET, (err, user) => {
      if (err) {
        return res.status(403).json({ error: 'Invalid token' });
      }
      req.user = user;
      next();
    });
  };
  \`\`\`
  
  **Cập nhật model User (thêm password):** (đã có từ tuần 5)

{ // Ngày 37
  t: "Authorization & Role-based Access Control",
  c: `**Phân quyền (Authorization):**
  - User thường: chỉ xem/sửa/xóa tài nguyên của mình
  - Admin: có thể xem/sửa/xóa tất cả
  
  **Thêm role vào model User:** (đã có)
  
  **Middleware authorize – kiểm tra role:**
  \`\`\`js
  const authorize = (...roles) => {
    return (req, res, next) => {
      if (!req.user) {
        return res.status(401).json({ error: 'Unauthorized' });
      }
      
      if (!roles.includes(req.user.role)) {
        return res.status(403).json({ error: 'Forbidden: insufficient role' });
      }
      
      next();
    };
  };
  
  // Sử dụng:
  app.get('/admin/users', authenticate, authorize('admin'), adminController.getAllUsers);
  \`\`\`
  
  **Kiểm tra quyền sở hữu (ownership):**
  \`\`\`js
  const checkTaskOwnership = async (req, res, next) => {
    try {
      const taskId = Number(req.params.id);
      const userId = req.user.userId;
      const userRole = req.user.role;
      
      const task = await prisma.task.findUnique({ where: { id: taskId } });
      
      if (!task) {
        return res.status(404).json({ error: 'Task not found' });
      }
      
      // Admin có thể sửa/xóa bất kỳ task
      if (userRole === 'admin' || task.userId === userId) {
        req.task = task; // gắn task vào req để dùng sau
        return next();
      }
      
      return res.status(403).json({ error: 'You do not own this task' });
    } catch (error) {
      next(error);
    }
  };
  
  // Sử dụng cho PUT, DELETE
  router.put('/:id', authenticate, checkTaskOwnership, taskController.updateTask);
  \`\`\``,

  \`\`\`bash
  npm install cors
  \`\`\`
  \`\`\`js
  const cors = require('cors');
  
  // Cho phép tất cả (development)
  app.use(cors());
  
  // Cấu hình chi tiết cho production

    origin: ['https://your-frontend.vercel.app', 'http://localhost:3000'],

  };

  \`\`\`
  
  **Rate limiting – chống brute force, DDoS:**
  \`\`\`bash
  npm install express-rate-limit
  \`\`\`
  \`\`\`js
  const rateLimit = require('express-rate-limit');
  
  // Giới hạn chung
  const limiter = rateLimit({
    windowMs: 15 * 60 * 1000, // 15 phút
    max: 100, // mỗi IP tối đa 100 request
    message: { error: 'Too many requests, please try again later.' }
  });
  
  app.use('/api', limiter);
  
  // Giới hạn riêng cho login (chậm hơn)
  const loginLimiter = rateLimit({
    windowMs: 60 * 60 * 1000, // 1 giờ
    max: 5, // chỉ được thử 5 lần
    skipSuccessfulRequests: true // không đếm nếu thành công
  });

{ // Ngày 39
  t: "WebSocket với Socket.io – Realtime cho ứng dụng",
  c: `**Socket.io** cho phép giao tiếp hai chiều realtime giữa client và server.
  
  **Cài đặt:**
  \`\`\`bash
  npm install socket.io
  \`\`\`
  
  **Tích hợp Socket.io vào Express:**
  \`\`\`js
  const http = require('http');
  const { Server } = require('socket.io');
  
  const app = require('./src/app');
  const server = http.createServer(app);
  const io = new Server(server, {
    cors: {
      origin: 'http://localhost:3000',
      methods: ['GET', 'POST']
    }
  });
  
  io.on('connection', (socket) => {
    console.log('Client connected:', socket.id);
    
    // Join room theo userId
    socket.on('join', (userId) => {
      socket.join(\`user:\${userId}\`);
    });
    
    // Lắng nghe sự kiện task mới
    socket.on('task:create', async (task) => {
      // Lưu task vào database (gọi controller)
      // ...
      
      // Phát lại cho tất cả client đang theo dõi user đó
      io.to(\`user:\${task.userId}\`).emit('task:created', task);
    });
    
    // Lắng nghe sự kiện task cập nhật
    socket.on('task:update', async (task) => {
      io.to(\`user:\${task.userId}\`).emit('task:updated', task);
    });
    
    // Lắng nghe sự kiện task xóa
    socket.on('task:delete', async ({ taskId, userId }) => {
      io.to(\`user:\${userId}\`).emit('task:deleted', taskId);
    });
    
    socket.on('disconnect', () => {
      console.log('Client disconnected:', socket.id);
    });
  });
  
  // Thay vì app.listen, dùng server.listen
  const PORT = process.env.PORT || 3000;
  server.listen(PORT, () => {
    console.log(\`Server running on port \${PORT}\`);
  });
  \`\`\`
  
  **Xác thực Socket.io với JWT:**
  \`\`\`js
  // middleware socketAuth
  io.use((socket, next) => {
    const token = socket.handshake.auth.token;
    if (!token) return next(new Error('Authentication error'));
    
    jwt.verify(token, process.env.JWT_SECRET, (err, user) => {
      if (err) return next(new Error('Invalid token'));
      socket.user = user;
      next();
    });
  });
  \`\`\``,
  
  p: `Thêm realtime cho Task Manager API:

  4. Khi user tạo task mới (qua API), emit 'task:created' cho room của user đó.

  6. Test bằng cách mở 2 tab giả lập 2 user, thao tác ở tab 1, tab 2 nhận được realtime.`,

{ // Ngày 43
  t: "Cấu hình Axios & Interceptor – Kết nối React với Backend",
  c: `**Axios** – thư viện gọi API mạnh mẽ hơn fetch.
  
  **Cài đặt:**
  \`\`\`bash
  npm install axios
  \`\`\`
  
  **Tạo instance axios với baseURL:**
  \`\`\`js
  // src/api/axios.js
  import axios from 'axios';

  const instance = axios.create({
    baseURL: import.meta.env.VITE_API_URL || 'http://localhost:5000/api',
    timeout: 10000,
    headers: { 'Content-Type': 'application/json' }
  });

  export default instance;
  \`\`\`
  
  **Interceptor – tự động gắn token vào mỗi request:**
  \`\`\`js
  // Request interceptor
  instance.interceptors.request.use(
    (config) => {
      const token = localStorage.getItem('token');
      if (token) {
        config.headers.Authorization = \`Bearer \${token}\`;
      }
      return config;
    },
    (error) => Promise.reject(error)
  );

  // Response interceptor – xử lý lỗi tập trung
  instance.interceptors.response.use(
    (response) => response.data,
    (error) => {
      if (error.response?.status === 401) {
        // Token hết hạn
        localStorage.removeItem('token');
        window.location.href = '/login';
      }
      return Promise.reject(error.response?.data || error);
    }
  );
  \`\`\`
  
  **Tạo các API service:**
  \`\`\`js

  };

  };
  \`\`\``,

{ // Ngày 44
  t: "Xác thực JWT trên Frontend – Quản lý trạng thái đăng nhập",
  c: `**Auth Store với Zustand:**
  \`\`\`js
  // src/stores/authStore.js
  import { create } from 'zustand';
  import { persist } from 'zustand/middleware';
  import { authApi } from '../api/auth';

  const useAuthStore = create(
    persist(
      (set, get) => ({
        user: null,
        token: null,
        isLoading: false,
        error: null,

        login: async (email, password) => {
          set({ isLoading: true, error: null });
          try {
            const data = await authApi.login(email, password);
            localStorage.setItem('token', data.token);
            set({ user: data.user, token: data.token, isLoading: false });
          } catch (error) {
            set({ error: error?.error || 'Login failed', isLoading: false });
          }
        },

        register: async (name, email, password) => {
          set({ isLoading: true, error: null });
          try {
            const data = await authApi.register(name, email, password);
            localStorage.setItem('token', data.token);
            set({ user: data.user, token: data.token, isLoading: false });
          } catch (error) {
            set({ error: error?.error || 'Registration failed', isLoading: false });
          }
        },

        logout: () => {
          authApi.logout();
          localStorage.removeItem('token');
          set({ user: null, token: null });
        },

        loadUser: async () => {
          const token = localStorage.getItem('token');
          if (!token) return;
          
          set({ isLoading: true });
          try {
            const user = await authApi.getProfile();
            set({ user, token, isLoading: false });
          } catch (error) {
            localStorage.removeItem('token');
            set({ user: null, token: null, isLoading: false });
          }
        },

        clearError: () => set({ error: null })
      }),
      {
        name: 'auth-storage',
        partialize: (state) => ({ user: state.user, token: state.token })
      }
    )
  );
  \`\`\`

{ // Ngày 45
  t: "CRUD với Backend – Kết nối Task Manager với API thật",
  c: `**Task Store tích hợp API (Zustand):**
  \`\`\`js
  // src/stores/taskStore.js
  import { create } from 'zustand';
  import { tasksApi } from '../api/tasks';

  const useTaskStore = create((set, get) => ({
    tasks: [],
    isLoading: false,
    error: null,

    fetchTasks: async (params = {}) => {
      set({ isLoading: true, error: null });
      try {
        const tasks = await tasksApi.getAll(params);
        set({ tasks, isLoading: false });
      } catch (error) {
        set({ error: error?.error || 'Failed to fetch tasks', isLoading: false });
      }
    },

    addTask: async (taskData) => {
      set({ isLoading: true, error: null });
      try {
        const newTask = await tasksApi.create(taskData);
        set((state) => ({
          tasks: [...state.tasks, newTask],
          isLoading: false
        }));
        return newTask;
      } catch (error) {
        set({ error: error?.error || 'Failed to create task', isLoading: false });
        throw error;
      }
    },

    updateTask: async (id, updates) => {
      set({ isLoading: true, error: null });
      try {
        const updatedTask = await tasksApi.update(id, updates);
        set((state) => ({
          tasks: state.tasks.map(t => t.id === id ? updatedTask : t),
          isLoading: false
        }));
        return updatedTask;
      } catch (error) {
        set({ error: error?.error || 'Failed to update task', isLoading: false });
        throw error;
      }
    },

    deleteTask: async (id) => {
      set({ isLoading: true, error: null });
      try {
        await tasksApi.delete(id);
        set((state) => ({
          tasks: state.tasks.filter(t => t.id !== id),
          isLoading: false
        }));
      } catch (error) {
        set({ error: error?.error || 'Failed to delete task', isLoading: false });
        throw error;
      }
    },

    // Optimistic update cho kéo thả
    moveTask: async (taskId, newStatus, newPosition) => {
      const previousTasks = get().tasks;
      
      // Cập nhật UI ngay lập tức
      set((state) => ({
        tasks: state.tasks.map(t =>
          t.id === taskId ? { ...t, status: newStatus } : t
        )
      }));

      try {
        await tasksApi.update(taskId, { status: newStatus, position: newPosition });
      } catch (error) {
        // Rollback nếu lỗi
        set({ tasks: previousTasks, error: 'Failed to update task position' });
      }
    }
  }));
  \`\`\`
  
  **Xử lý form CRUD với React Hook Form:**
  \`\`\`jsx
  // TaskFormModal.jsx
  import { useForm } from 'react-hook-form';
  import { zodResolver } from '@hookform/resolvers/zod';
  import { z } from 'zod';
  
  const taskSchema = z.object({
    title: z.string().min(1, 'Title is required'),
    description: z.string().optional(),
    status: z.enum(['todo', 'in-progress', 'done']),
    priority: z.enum(['low', 'medium', 'high']),
    dueDate: z.string().optional()
  });
  
  function TaskFormModal({ task, onSave, onClose }) {
    const { register, handleSubmit, formState: { errors } } = useForm({
      resolver: zodResolver(taskSchema),
      defaultValues: task || { status: 'todo', priority: 'medium' }
    });
    
    const onSubmit = async (data) => {
      await onSave(data);
      onClose();
    };
    
    return (
      <form onSubmit={handleSubmit(onSubmit)}>
        <input {...register('title')} />
        {errors.title && <p>{errors.title.message}</p>}
        {/* các trường khác */}
        <button type="submit">Save</button>
      </form>
    );
  }

{ // Ngày 46
  t: "Realtime với Socket.io – Đồng bộ nhiều client",
  c: `**Tích hợp socket.io vào React:**
  \`\`\`js
  // src/socket.js
  import { io } from 'socket.io-client';

  const SOCKET_URL = import.meta.env.VITE_SOCKET_URL || 'http://localhost:5000';
  
  const socket = io(SOCKET_URL, {
    autoConnect: false,
    withCredentials: true,
    reconnection: true,
    reconnectionAttempts: 5,
    reconnectionDelay: 1000
  });

  export default socket;
  \`\`\`
  
  **Kết nối khi user login:**
  \`\`\`js
  // Trong authStore, sau login thành công
  import socket from '../socket';

  // Trong login action
  socket.connect();
  socket.emit('join', user.id);

  // Trong logout action
  socket.disconnect();
  \`\`\`
  
  **Lắng nghe sự kiện trong React:**
  \`\`\`jsx
  // Trong App.jsx hoặc component cha
  useEffect(() => {
    const handleTaskCreated = (newTask) => {
      const currentUser = useAuthStore.getState().user;
      if (newTask.userId === currentUser?.id) {
        useTaskStore.getState().addTask(newTask);
      }
    };

    const handleTaskUpdated = (updatedTask) => {
      useTaskStore.getState().updateTask(updatedTask.id, updatedTask);
    };

    const handleTaskDeleted = (taskId) => {
      useTaskStore.getState().deleteTask(taskId);
    };

    socket.on('task:created', handleTaskCreated);
    socket.on('task:updated', handleTaskUpdated);
    socket.on('task:deleted', handleTaskDeleted);

    return () => {
      socket.off('task:created', handleTaskCreated);
      socket.off('task:updated', handleTaskUpdated);
      socket.off('task:deleted', handleTaskDeleted);
    };
  }, []);
  \`\`\`
  
  **Phát sự kiện từ frontend:**
  \`\`\`js
  // Trong taskStore, sau khi API thành công
  import socket from '../socket';

  const addTask = async (taskData) => {
    // ... gọi API
    const newTask = await tasksApi.create(taskData);
    socket.emit('task:created', newTask); // Phát cho các client khác
    // ... cập nhật store
  };
  \`\`\``,
  
  p: `Thêm realtime cho Task Manager Pro:

{ // Ngày 47
  t: "Tối ưu hiệu suất với React Query",
  c: `**React Query (TanStack Query)** giúp quản lý server state, caching, background updates.
  
  **Cài đặt:**
  \`\`\`bash
  npm install @tanstack/react-query
  \`\`\`
  
  **Tạo query client và provider:**
  \`\`\`jsx
  // src/main.jsx
  import { QueryClient, QueryClientProvider } from '@tanstack/react-query';
  import { ReactQueryDevtools } from '@tanstack/react-query-devtools';

  const queryClient = new QueryClient({
    defaultOptions: {
      queries: {
        staleTime: 1000 * 60 * 5, // 5 phút
        cacheTime: 1000 * 60 * 10, // 10 phút
        retry: 1,
        refetchOnWindowFocus: false,
      },
    },
  });

  ReactDOM.createRoot(document.getElementById('root')).render(
    <QueryClientProvider client={queryClient}>
      <App />
      <ReactQueryDevtools initialIsOpen={false} />
    </QueryClientProvider>
  );
  \`\`\`
  
  **Custom hooks với React Query:**
  \`\`\`jsx
  // src/hooks/useTasks.js
  import { useQuery, useMutation, useQueryClient } from '@tanstack/react-query';
  import { tasksApi } from '../api/tasks';

  export const useTasks = (params) => {
    return useQuery({
      queryKey: ['tasks', params],
      queryFn: () => tasksApi.getAll(params),
      keepPreviousData: true,
    });
  };

  export const useTask = (id) => {
    return useQuery({
      queryKey: ['tasks', id],
      queryFn: () => tasksApi.getById(id),
      enabled: !!id,
    });
  };

  export const useCreateTask = () => {
    const queryClient = useQueryClient();
    
    return useMutation({
      mutationFn: tasksApi.create,
      onSuccess: (newTask) => {
        queryClient.setQueryData(['tasks'], (old) => [...old, newTask]);
        // Hoặc invalidate queries
        // queryClient.invalidateQueries(['tasks']);
      },
    });
  };

  export const useUpdateTask = () => {
    const queryClient = useQueryClient();
    
    return useMutation({
      mutationFn: ({ id, data }) => tasksApi.update(id, data),
      onSuccess: (updatedTask) => {
        queryClient.setQueryData(['tasks'], (old) =>
          old.map(t => t.id === updatedTask.id ? updatedTask : t)
        );
      },
    });
  };

  export const useDeleteTask = () => {
    const queryClient = useQueryClient();
    
    return useMutation({
      mutationFn: tasksApi.delete,
      onSuccess: (_, deletedId) => {
        queryClient.setQueryData(['tasks'], (old) =>
          old.filter(t => t.id !== deletedId)
        );
      },
    });
  };
  \`\`\`
  
  **Sử dụng trong component với form:**
  \`\`\`jsx
  const createTask = useCreateTask();
  
  const handleSubmit = async (data) => {
    try {
      await createTask.mutateAsync(data);
      toast.success('Task created');
      onClose();
    } catch (error) {
      toast.error('Failed to create task');
    }
  };
  \`\`\``,
  
  p: `Thay thế Zustand tasks bằng React Query:
  
  1. Cài React Query và tích hợp vào App.
  2. Tạo custom hooks: useTasks, useTask, useCreateTask, useUpdateTask, useDeleteTask.
  3. Sử dụng useTasks trong BoardView thay vì taskStore.
  4. Thêm loading và error state từ React Query.
  5. Tích hợp với form: khi submit, gọi mutateAsync, hiển thị loading, sau thành công đóng modal.
  6. So sánh performance và trải nghiệm.`,

        window.toggleDay = function(event, header) {
    // Nếu click vào nút "XONG" thì không toggle
    if (event.target.classList.contains('done-btn') || event.target.closest('.done-btn')) {
        return;
    }
    let content = header.nextElementSibling;
    if (!content || !content.classList.contains('day-content')) return;

    let isOpen = content.classList.contains('block');

    // Đóng tất cả các content khác
    document.querySelectorAll('.day-content').forEach(c => {
        if (c !== content) c.classList.remove('block');
    });

    // Toggle content hiện tại: nếu đang mở thì đóng, nếu đang đóng thì mở
    if (isOpen) {
        content.classList.remove('block');
    } else {
        content.classList.add('block');
    }
};
